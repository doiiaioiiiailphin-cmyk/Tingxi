<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>听隙 Tingxi · 听见时间的缝隙</title>
  <meta name="description" content="听隙 Tingxi —— 一个东方留白、夜色与月光交织的网页音乐播放器。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 背景氛围层 -->
  <canvas id="atmosphere" aria-hidden="true"></canvas>
  <div class="aurora" id="aurora" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- 主舞台 -->
  <main class="stage">
    <header class="brand">
      <h1 class="brand__title">听&nbsp;隙</h1>
      <p class="brand__subtitle">Tingxi &nbsp;·&nbsp; 听见时间的缝隙</p>
    </header>

    <!-- 播放器主体 -->
    <section class="player glass" id="player" aria-label="音乐播放器">
      <div class="player__cover" id="cover" aria-hidden="true"></div>

      <div class="player__meta">
        <div class="player__title" id="trackTitle">—</div>
        <div class="player__artist" id="trackArtist">—</div>
      </div>

      <!-- 进度条 -->
      <div class="progress" id="progress">
        <div class="progress__track">
          <div class="progress__fill" id="progressFill"></div>
          <div class="progress__thumb" id="progressThumb"></div>
        </div>
        <div class="progress__times">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <!-- 主控制 -->
      <div class="controls">
        <button class="ctrl" id="prevBtn" type="button" aria-label="上一首" title="上一首">
          <svg viewBox="0 0 24 24" class="icon"><path d="M7 5v14M19 5L9 12l10 7V5z"/></svg>
        </button>
        <button class="ctrl ctrl--play" id="playBtn" type="button" aria-label="播放或暂停" title="播放 / 暂停">
          <svg viewBox="0 0 24 24" class="icon icon--play" id="iconPlay"><path d="M8 5v14l11-7z"/></svg>
          <svg viewBox="0 0 24 24" class="icon icon--pause" id="iconPause" style="display:none"><path d="M8 5h3v14H8zM13 5h3v14h-3z"/></svg>
        </button>
        <button class="ctrl" id="nextBtn" type="button" aria-label="下一首" title="下一首">
          <svg viewBox="0 0 24 24" class="icon"><path d="M17 5v14M5 5l10 7L5 19V5z"/></svg>
        </button>
      </div>

      <!-- 音量 -->
      <div class="volume">
        <button class="ctrl ctrl--sm" id="muteBtn" type="button" aria-label="静音切换" title="静音">
          <svg viewBox="0 0 24 24" class="icon" id="iconVolume"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path class="vol-wave" d="M16 9a4 4 0 010 6"/></svg>
        </button>
        <div class="volume__bar" id="volumeBar">
          <div class="volume__fill" id="volumeFill"></div>
          <div class="volume__thumb" id="volumeThumb"></div>
        </div>
      </div>
    </section>

    <!-- 播放列表开关 -->
    <button class="ghost-btn" id="plToggle" type="button">
      <svg viewBox="0 0 24 24" class="icon icon--sm"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
      <span>曲目</span>
    </button>
  </main>

  <!-- 播放列表 -->
  <aside class="playlist glass" id="playlist" aria-label="播放列表" aria-hidden="true">
    <div class="playlist__head">
      <h2>曲目</h2>
      <div class="playlist__actions">
        <button class="ghost-btn ghost-btn--sm" id="midiAdd" type="button" title="添加 MIDI 文件">
          <svg viewBox="0 0 24 24" class="icon icon--sm"><path d="M12 5v14M5 12h14"/></svg>
          <span>MIDI</span>
        </button>
        <button class="ctrl ctrl--sm" id="plClose" type="button" aria-label="关闭列表">
          <svg viewBox="0 0 24 24" class="icon"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </div>
    <ul class="playlist__list" id="playlistItems"></ul>
  </aside>

  <input type="file" id="midiInput" accept=".mid,.midi,audio/midi,audio/x-midi" multiple hidden />
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="scrim" id="scrim" aria-hidden="true"></div>

  <script src="js/midi/midi-parser.js"></script>
  <script src="js/midi/audio-engine.js"></script>
  <script src="js/atmosphere.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
